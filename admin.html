<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quest Admin Portal</title>
  <style>
    body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
    h1 { text-align: center; color: #f0c674; }
    section { margin-bottom: 40px; }
    input, textarea, button { display: block; margin: 10px 0; padding: 8px; width: 100%; max-width: 400px; }
    button { background: #f0c674; border: none; cursor: pointer; }
    button:hover { background: #e0b560; }
    label { margin-top: 10px; font-weight: bold; }
    #login-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <h1>Magical Quest Admin Portal</h1>
    <p>Sign in with Google to manage quests and upload new adventures.</p>
    <button id="login-btn">Login with Google</button>
  </div>

  <!-- ADMIN PANEL (HIDDEN BY DEFAULT) -->
  <div id="admin-panel" style="display:none;">

    <div style="text-align:right;">
      <span id="user-info"></span>
      <button id="logout-btn">Logout</button>
    </div>

    <h2>Batch Import Quests</h2>
    <input type="file" id="batch-json" accept=".json">
    <select id="quest-list">
      <option value="faye">Faye</option>
      <option value="external">External</option>
    </select>
    <button id="batch-import-btn">Batch Import</button>

    <hr>

    <h2>Add Single Quest</h2>
    <select id="quest-list-single">
      <option value="faye">Faye</option>
      <option value="external">External</option>
    </select>

    <form id="single-quest-form">
      <input id="indoor-title" placeholder="Indoor Title">
      <textarea id="indoor-desc" placeholder="Indoor Description"></textarea>
      <input id="indoor-bonus" placeholder="Indoor Bonus">

      <input id="outdoor-title" placeholder="Outdoor Title">
      <textarea id="outdoor-desc" placeholder="Outdoor Description"></textarea>
      <input id="outdoor-bonus" placeholder="Outdoor Bonus">

      <button type="submit">Add Single Quest</button>
    </form>

  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
